<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Meu carrinho — Allaser</title>
<meta name="description" content="Revise os cursos no seu carrinho e finalize a compra com segurança.">
<meta name="robots" content="noindex, nofollow">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&family=Outfit:wght@500;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/assets/shared.css">
<style>
.cart-page { max-width: 1160px; margin: 0 auto; padding: 48px 24px 96px; }
.cart-header { display: flex; align-items: baseline; justify-content: space-between; gap: 16px; margin-bottom: 32px; flex-wrap: wrap; }
.cart-title { font-family: 'Outfit', sans-serif; font-size: clamp(1.75rem, 3vw, 2.4rem); font-weight: 800; color: var(--dark-800); letter-spacing: -0.02em; }
.cart-sub { color: var(--gray-400); font-size: 0.9rem; }

.cart-layout { display: grid; grid-template-columns: 1fr 380px; gap: 32px; align-items: start; }
@media (max-width: 900px) { .cart-layout { grid-template-columns: 1fr; } }

.cart-items { display: flex; flex-direction: column; gap: 12px; }
.cart-item { display: grid; grid-template-columns: 90px 1fr auto; gap: 18px; align-items: center; padding: 16px; background: #fff; border: 1px solid var(--gray-100); border-radius: 14px; transition: border-color 0.2s; }
.cart-item:hover { border-color: var(--gray-200); }
.cart-item__thumb { width: 90px; aspect-ratio: 9/16; background: var(--gray-50); border-radius: 8px; overflow: hidden; }
.cart-item__thumb img { width: 100%; height: 100%; object-fit: cover; display: block; }
.cart-item__body { display: flex; flex-direction: column; gap: 6px; min-width: 0; }
.cart-item__name { font-family: 'Outfit', sans-serif; font-size: 1rem; font-weight: 700; color: var(--dark-800); line-height: 1.25; overflow: hidden; text-overflow: ellipsis; }
.cart-item__meta { font-size: 0.78rem; color: var(--gray-400); }
.cart-item__actions { display: flex; align-items: center; gap: 14px; }
.qty-ctrl { display: inline-flex; align-items: center; border: 1px solid var(--gray-200); border-radius: 999px; overflow: hidden; }
.qty-ctrl button { width: 30px; height: 30px; border: none; background: #fff; color: var(--dark-700); cursor: pointer; font-family: inherit; font-size: 1rem; font-weight: 600; transition: background 0.15s; }
.qty-ctrl button:hover:not(:disabled) { background: var(--gray-50); color: var(--lime-dark); }
.qty-ctrl button:disabled { opacity: 0.35; cursor: not-allowed; }
.qty-ctrl__val { min-width: 30px; text-align: center; font-family: 'Outfit', sans-serif; font-size: 0.9rem; font-weight: 700; color: var(--dark-800); }
.cart-item__price { font-family: 'Outfit', sans-serif; font-size: 1.02rem; font-weight: 800; color: var(--dark-800); white-space: nowrap; min-width: 100px; text-align: right; }
.cart-item__remove { background: none; border: none; color: var(--gray-400); cursor: pointer; padding: 6px; border-radius: 6px; transition: all 0.15s; }
.cart-item__remove:hover { color: #b83a3a; background: rgba(214,69,69,0.08); }
.cart-item__remove svg { width: 15px; height: 15px; display: block; }

@media (max-width: 600px) {
  .cart-item { grid-template-columns: 72px 1fr; row-gap: 12px; }
  .cart-item__thumb { width: 72px; }
  .cart-item__actions { grid-column: 1 / -1; justify-content: space-between; }
}

.cart-empty, .cart-loading { text-align: center; padding: 80px 24px; background: #fff; border: 1px dashed var(--gray-200); border-radius: 16px; }
.cart-empty svg, .cart-loading svg { width: 48px; height: 48px; color: var(--gray-300); margin-bottom: 16px; }
.cart-empty h2 { font-family: 'Outfit', sans-serif; font-size: 1.3rem; font-weight: 800; color: var(--dark-700); margin-bottom: 8px; }
.cart-empty p { color: var(--gray-400); margin-bottom: 20px; font-size: 0.92rem; }

.cart-summary { background: #fff; border: 1px solid var(--gray-100); border-radius: 16px; padding: 28px; position: sticky; top: 88px; }
.cart-summary h3 { font-family: 'Outfit', sans-serif; font-size: 1.05rem; font-weight: 700; color: var(--dark-800); margin-bottom: 18px; }
.summary-row { display: flex; justify-content: space-between; padding: 8px 0; font-size: 0.9rem; color: var(--dark-700); }
.summary-row--discount { color: var(--lime-dark); font-weight: 600; }
.summary-total { display: flex; justify-content: space-between; align-items: baseline; padding-top: 14px; margin-top: 14px; border-top: 1px solid var(--gray-100); }
.summary-total__label { font-family: 'Outfit', sans-serif; font-size: 0.85rem; font-weight: 700; color: var(--dark-700); }
.summary-total__val { font-family: 'Outfit', sans-serif; font-size: 1.55rem; font-weight: 800; color: var(--dark-800); }

.checkout-btn { width: 100%; margin-top: 20px; padding: 16px; background: var(--lime); color: var(--dark-900); font-family: 'Outfit', sans-serif; font-weight: 800; font-size: 1rem; border-radius: 999px; border: none; cursor: pointer; transition: all 0.2s; display: flex; align-items: center; justify-content: center; gap: 8px; }
.checkout-btn:hover:not(:disabled) { background: var(--lime-light); transform: translateY(-1px); box-shadow: 0 8px 24px rgba(201,220,68,0.35); }
.checkout-btn:disabled { opacity: 0.6; cursor: wait; }
.checkout-note { text-align: center; margin-top: 12px; font-size: 0.75rem; color: var(--gray-400); }

.btn-continue { display: inline-flex; align-items: center; gap: 6px; padding: 10px 20px; background: var(--dark-800); color: #fff; font-family: 'Outfit', sans-serif; font-weight: 700; font-size: 0.88rem; border-radius: 999px; text-decoration: none; }
.btn-continue:hover { background: var(--dark-900); }
</style>
</head>
<body>
<div id="site-header"></div>

<main id="main-content">
<div class="cart-page">
  <div class="cart-header">
    <div>
      <h1 class="cart-title">Meu carrinho</h1>
      <div class="cart-sub" id="cartSub">Carregando…</div>
    </div>
  </div>

  <div id="cartRoot">
    <div class="cart-loading">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg>
      <p style="color:var(--gray-400);font-size:0.92rem">Carregando seu carrinho…</p>
    </div>
  </div>
</div>
</main>

<div id="site-footer"></div>

<script src="/assets/api.js?v=20260702"></script>
<script src="/assets/components.js?v=20260702"></script>
<script src="/assets/shared.js"></script>
<script>
(function () {
  var root = document.getElementById('cartRoot');
  var sub  = document.getElementById('cartSub');

  function fmt(v) { return Number(v || 0).toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' }); }
  function esc(s) { return String(s || '').replace(/[&<>"']/g, function (c) { return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]; }); }
  function imgUrl(u) { return Api.absUrl(u); }

  function renderEmpty() {
    sub.textContent = 'Você ainda não adicionou nenhum curso.';
    root.innerHTML = ''
      + '<div class="cart-empty">'
      +   '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>'
      +   '<h2>Seu carrinho está vazio</h2>'
      +   '<p>Explore o catálogo e adicione cursos que você quer estudar.</p>'
      +   '<a href="/index.html#cursos-home" class="btn-continue">Ver cursos <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M12 5l7 7-7 7"/></svg></a>'
      + '</div>';
  }

  function render(cart) {
    // Contrato v2: cart-list retorna items[], subtotal, discount, total, count na raiz
    if (!cart || !cart.items || !cart.items.length) { renderEmpty(); window.emitCartChanged({ count: 0 }); return; }

    window.emitCartChanged({ count: cart.count });
    sub.textContent = cart.count + (cart.count === 1 ? ' item' : ' itens') + ' • total ' + fmt(cart.total);

    var items = cart.items.map(function (it) {
      var cover = it.cover ? '<img src="' + esc(imgUrl(it.cover)) + '" alt="' + esc(it.name) + '">' : '';
      return '<div class="cart-item" data-item-id="' + esc(it.item_id) + '">'
        + '<div class="cart-item__thumb">' + cover + '</div>'
        + '<div class="cart-item__body">'
        +   '<div class="cart-item__name">' + esc(it.name) + '</div>'
        +   '<div class="cart-item__meta">' + fmt(it.unit_price) + ' cada</div>'
        + '</div>'
        + '<div class="cart-item__actions">'
        +   '<div class="qty-ctrl">'
        +     '<button type="button" data-act="dec"' + (it.qty <= 1 ? ' disabled' : '') + '>−</button>'
        +     '<span class="qty-ctrl__val">' + it.qty + '</span>'
        +     '<button type="button" data-act="inc">+</button>'
        +   '</div>'
        +   '<div class="cart-item__price">' + fmt(it.line_total) + '</div>'
        +   '<button type="button" class="cart-item__remove" data-act="remove" aria-label="Remover">'
        +     '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>'
        +   '</button>'
        + '</div>'
      + '</div>';
    }).join('');

    var summary = '<aside class="cart-summary">'
      + '<h3>Resumo</h3>'
      + '<div class="summary-row"><span>Subtotal</span><span>' + fmt(cart.subtotal) + '</span></div>'
      + (cart.discount > 0 ? '<div class="summary-row summary-row--discount"><span>Desconto</span><span>− ' + fmt(cart.discount) + '</span></div>' : '')
      + '<div class="summary-total"><span class="summary-total__label">Total</span><span class="summary-total__val">' + fmt(cart.total) + '</span></div>'
      + '<button type="button" class="checkout-btn" id="checkoutBtn">'
      +   'Finalizar compra'
      +   '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M12 5l7 7-7 7"/></svg>'
      + '</button>'
      + '<div class="checkout-note">Pagamento seguro no ambiente Allaser</div>'
    + '</aside>';

    root.innerHTML = '<div class="cart-layout"><div class="cart-items">' + items + '</div>' + summary + '</div>';
    attach();
  }

  function attach() {
    document.querySelectorAll('.cart-item').forEach(function (row) {
      var id = row.dataset.itemId;
      row.querySelectorAll('button[data-act]').forEach(function (b) {
        b.addEventListener('click', function () {
          var act = b.dataset.act;
          if (act === 'remove') {
            Api.cartRemove({ item_id: id }).then(handleCartResp);
          } else {
            var val = parseInt(row.querySelector('.qty-ctrl__val').textContent, 10);
            var newQty = act === 'inc' ? val + 1 : Math.max(1, val - 1);
            Api.cartUpdate({ item_id: id, qty: newQty }).then(handleCartResp);
          }
        });
      });
    });
    document.getElementById('checkoutBtn').addEventListener('click', function () {
      // Contrato v2: front so redireciona. Login, pagamento, matricula sao do backend.
      window.location.href = Api.URLS.checkout;
    });
  }

  function handleCartResp(r) {
    if (r && r.ok) {
      // cart-update/remove retorna {ok, cart} — mas cart-list retorna items[] na raiz.
      // Como o dev colocou a estrutura no cart e "flat" no list, tento os dois.
      if (r.cart) render(normalize(r.cart));
      else load();
    } else {
      window.showToast((r && r.error) || 'Erro', 'error');
    }
  }

  function normalize(cart) {
    // Se veio no formato do cart-list (flat), retorna como esta.
    if (cart.items) return cart;
    return cart;
  }

  function load() {
    Api.cartList().then(function (r) {
      if (r && r.ok) render({
        items:    r.items || [],
        subtotal: r.subtotal || 0,
        discount: r.discount || 0,
        total:    r.total || 0,
        count:    r.count || 0
      });
      else renderEmpty();
    }).catch(renderEmpty);
  }

  load();
})();
</script>
</body>
</html>
