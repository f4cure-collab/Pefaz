<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Minhas compras — Allaser</title>
<meta name="description" content="Histórico dos seus pedidos na Allaser: status, itens e retomar pagamento.">
<meta name="robots" content="noindex, nofollow">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&family=Outfit:wght@500;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/assets/shared.css">
<style>
.orders-page { max-width: 1080px; margin: 0 auto; padding: 48px 24px 96px; }
.orders-title { font-family: 'Outfit', sans-serif; font-size: clamp(1.75rem, 3vw, 2.4rem); font-weight: 800; color: var(--dark-800); letter-spacing: -0.02em; margin-bottom: 6px; }
.orders-sub { color: var(--gray-400); font-size: 0.92rem; margin-bottom: 32px; }

.orders-list { display: flex; flex-direction: column; gap: 16px; }
.order-card {
  background: #fff; border: 1px solid var(--gray-100); border-radius: 14px;
  overflow: hidden; transition: box-shadow 0.2s;
}
.order-card:hover { box-shadow: 0 4px 20px rgba(0,0,0,0.05); }
.order-head {
  display: flex; align-items: center; justify-content: space-between;
  padding: 18px 22px; gap: 14px; flex-wrap: wrap;
  background: var(--gray-50); border-bottom: 1px solid var(--gray-100);
}
.order-head__left { display: flex; flex-direction: column; gap: 3px; }
.order-num { font-family: 'Outfit', sans-serif; font-size: 0.72rem; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; color: var(--gray-400); }
.order-date { font-family: 'Outfit', sans-serif; font-size: 0.95rem; font-weight: 700; color: var(--dark-800); }
.order-head__right { display: flex; align-items: center; gap: 14px; flex-wrap: wrap; }

.badge { display: inline-flex; align-items: center; gap: 5px; padding: 4px 10px; border-radius: 999px; font-family: 'Outfit', sans-serif; font-size: 0.72rem; font-weight: 700; letter-spacing: 0.04em; text-transform: uppercase; }
.badge--pending { background: rgba(230,180,20,0.14); color: #a37800; border: 1px solid rgba(230,180,20,0.28); }
.badge--paid    { background: rgba(60,175,90,0.14);  color: #237837; border: 1px solid rgba(60,175,90,0.28); }
.badge--cancelled { background: rgba(214,69,69,0.10); color: #a83a3a; border: 1px solid rgba(214,69,69,0.24); }
.badge--refunded  { background: rgba(120,120,120,0.12); color: #555; border: 1px solid rgba(120,120,120,0.22); }
.badge svg { width: 12px; height: 12px; }

.order-total { font-family: 'Outfit', sans-serif; font-size: 1.05rem; font-weight: 800; color: var(--dark-800); }

.order-items { padding: 14px 22px; display: flex; flex-direction: column; gap: 10px; }
.oi { display: grid; grid-template-columns: 56px 1fr auto; gap: 14px; align-items: center; }
.oi__thumb { width: 56px; aspect-ratio: 9/16; background: var(--gray-50); border-radius: 6px; overflow: hidden; }
.oi__thumb img { width: 100%; height: 100%; object-fit: cover; display: block; }
.oi__body { min-width: 0; }
.oi__name { font-family: 'Outfit', sans-serif; font-size: 0.92rem; font-weight: 700; color: var(--dark-800); line-height: 1.25; overflow: hidden; text-overflow: ellipsis; }
.oi__meta { font-size: 0.75rem; color: var(--gray-400); margin-top: 2px; }
.oi__price { font-family: 'Outfit', sans-serif; font-size: 0.9rem; font-weight: 700; color: var(--dark-700); white-space: nowrap; }

.order-actions { padding: 12px 22px 18px; display: flex; justify-content: flex-end; gap: 12px; border-top: 1px solid var(--gray-100); }
.btn-pay { display: inline-flex; align-items: center; gap: 6px; padding: 10px 20px; background: var(--lime); color: var(--dark-900); font-family: 'Outfit', sans-serif; font-weight: 800; font-size: 0.88rem; border-radius: 999px; text-decoration: none; border: none; cursor: pointer; }
.btn-pay:hover { background: var(--lime-light); transform: translateY(-1px); box-shadow: 0 6px 18px rgba(201,220,68,0.35); }

.state-msg { text-align: center; padding: 80px 24px; background: #fff; border: 1px dashed var(--gray-200); border-radius: 16px; }
.state-msg svg { width: 48px; height: 48px; color: var(--gray-300); margin-bottom: 16px; }
.state-msg h2 { font-family: 'Outfit', sans-serif; font-size: 1.3rem; font-weight: 800; color: var(--dark-700); margin-bottom: 8px; }
.state-msg p { color: var(--gray-400); font-size: 0.92rem; margin-bottom: 20px; }
.state-msg a { display: inline-flex; align-items: center; gap: 6px; padding: 10px 20px; background: var(--dark-800); color: #fff; font-family: 'Outfit', sans-serif; font-weight: 700; font-size: 0.88rem; border-radius: 999px; text-decoration: none; }
</style>
</head>
<body>
<div id="site-header"></div>

<main id="main-content">
<div class="orders-page">
  <h1 class="orders-title">Minhas compras</h1>
  <div class="orders-sub" id="ordersSub">Carregando…</div>
  <div id="ordersRoot"></div>
</div>
</main>

<div id="site-footer"></div>

<script src="/assets/api.js?v=20260702"></script>
<script src="/assets/components.js?v=20260702"></script>
<script src="/assets/shared.js"></script>
<script>
(function () {
  var root = document.getElementById('ordersRoot');
  var sub  = document.getElementById('ordersSub');

  function fmt(v) { return 'R$ ' + Number(v).toFixed(2).replace('.', ',').replace(/\B(?=(\d{3})+(?!\d))/g, '.'); }
  function esc(s) { return String(s || '').replace(/[&<>"']/g, function (c) { return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]; }); }

  function fmtDate(iso) {
    if (!iso) return '';
    var d = new Date(iso);
    return d.toLocaleDateString('pt-BR', { day: '2-digit', month: 'short', year: 'numeric' });
  }

  function badge(status) {
    var map = {
      pending:   ['badge--pending',   'Aguardando pagamento'],
      paid:      ['badge--paid',      'Pago'],
      cancelled: ['badge--cancelled', 'Cancelado'],
      refunded:  ['badge--refunded',  'Reembolsado']
    };
    var m = map[status] || ['badge--pending', status];
    return '<span class="badge ' + m[0] + '">' + m[1] + '</span>';
  }

  function renderEmpty() {
    sub.textContent = '0 pedidos';
    root.innerHTML = ''
      + '<div class="state-msg">'
      +   '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>'
      +   '<h2>Nenhuma compra ainda</h2>'
      +   '<p>Quando você comprar um curso, ele aparece aqui.</p>'
      +   '<a href="/index.html#cursos-home">Ver cursos</a>'
      + '</div>';
  }

  function renderLoggedOut() {
    sub.textContent = 'Faça login para ver suas compras';
    root.innerHTML = ''
      + '<div class="state-msg">'
      +   '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>'
      +   '<h2>Você não está logado</h2>'
      +   '<p>Entre na sua conta pra ver o histórico de pedidos.</p>'
      +   '<a href="/login.html?next=' + encodeURIComponent('/minhas-compras.html') + '">Entrar</a>'
      + '</div>';
  }

  function renderList(orders) {
    sub.textContent = orders.length + (orders.length === 1 ? ' pedido' : ' pedidos');
    root.innerHTML = '<div class="orders-list">' + orders.map(function (o) {
      var items = o.items.map(function (it) {
        return '<div class="oi">'
          + '<div class="oi__thumb">' + (it.product_image ? '<img src="' + esc(it.product_image) + '" alt="">' : '') + '</div>'
          + '<div class="oi__body">'
          +   '<div class="oi__name">' + esc(it.product_name) + '</div>'
          +   '<div class="oi__meta">' + it.qty + '× • ' + fmt(it.unit_price) + '</div>'
          + '</div>'
          + '<div class="oi__price">' + fmt(it.line_total) + '</div>'
        + '</div>';
      }).join('');

      var actions = '';
      if (o.status === 'pending' && o.payment_url) {
        actions = '<div class="order-actions">'
          + '<a class="btn-pay" href="' + esc(o.payment_url) + '">'
          +   'Retomar pagamento'
          +   '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M12 5l7 7-7 7"/></svg>'
          + '</a>'
        + '</div>';
      }

      return '<article class="order-card">'
        + '<div class="order-head">'
        +   '<div class="order-head__left">'
        +     '<div class="order-num">Pedido #' + o.id + '</div>'
        +     '<div class="order-date">' + fmtDate(o.created_at) + '</div>'
        +   '</div>'
        +   '<div class="order-head__right">'
        +     badge(o.status)
        +     '<div class="order-total">' + fmt(o.total) + '</div>'
        +   '</div>'
        + '</div>'
        + '<div class="order-items">' + items + '</div>'
        + actions
      + '</article>';
    }).join('') + '</div>';
  }

  // Suporte pro fluxo mock: se retornou do checkout com ?order=X&mock=paid, marca como pago
  var qs = new URLSearchParams(window.location.search);
  if (qs.get('mock') === 'paid' && qs.get('order') && Api._mockMarkPaid) {
    Api._mockMarkPaid(qs.get('order'));
    window.history.replaceState({}, '', '/minhas-compras.html');
    window.showToast && window.showToast('Pagamento confirmado');
  }

  Api.me().then(function (state) {
    if (!state.logged) { renderLoggedOut(); return; }
    Api.myOrders().then(function (r) {
      if (!r.orders.length) renderEmpty();
      else renderList(r.orders);
    });
  });
})();
</script>
</body>
</html>
